name: CD

on:
  push:
    branches: [main]
    paths:
      - 'NEVER_TRIGGER'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: edtech-lakehouse

      - name: Deploy lakehouse-ingest
        run: |
          gcloud run deploy lakehouse-ingest \
            --source ingestion/ \
            --region us-east1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account lakehouse-sa@edtech-lakehouse.iam.gserviceaccount.com

      - name: Deploy lakehouse-load
        run: |
          gcloud run deploy lakehouse-load \
            --source load/ \
            --region us-east1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account lakehouse-sa@edtech-lakehouse.iam.gserviceaccount.com